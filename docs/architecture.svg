<svg xmlns="http://www.w3.org/2000/svg" width="940" height="300" viewBox="0 0 940 300" role="img" aria-labelledby="title desc">
  <title id="title">Win31 X architecture</title>
  <desc id="desc">The Xorg root desktop connects Win31 X to framed application clients, minimized desktop icons, the application launcher, and a Control Panel backed by NetworkManager, settings, and the screen locker.</desc>
  <rect width="940" height="300" fill="#008080"/>
  <g font-family="monospace" font-size="16" text-anchor="middle">
    <rect x="25" y="100" width="170" height="88" fill="#c0c0c0" stroke="#fff" stroke-width="3"/>
    <rect x="29" y="104" width="162" height="23" fill="#000080"/>
    <text x="110" y="121" fill="#fff">Xorg root</text>
    <text x="110" y="156" fill="#000">desktop + input</text>
    <text x="110" y="177" fill="#000">event source</text>

    <rect x="245" y="50" width="210" height="194" fill="#c0c0c0" stroke="#fff" stroke-width="3"/>
    <rect x="249" y="54" width="202" height="25" fill="#000080"/>
    <text x="350" y="72" fill="#fff">Win31 X</text>
    <text x="350" y="108" fill="#000">reparent + decorate</text>
    <text x="350" y="134" fill="#000">focus + lifecycle</text>
    <text x="350" y="160" fill="#000">ICCCM / EWMH</text>
    <text x="350" y="186" fill="#000">desktop UI</text>
    <text x="350" y="212" fill="#000">async services</text>

    <rect x="505" y="15" width="405" height="52" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="707" y="47" fill="#000">framed X11 application clients</text>
    <rect x="505" y="78" width="405" height="52" fill="#ffff00" stroke="#000" stroke-width="2"/>
    <text x="707" y="110" fill="#000">clickable minimized-window icons</text>
    <rect x="505" y="141" width="405" height="58" fill="#c0c0c0" stroke="#000" stroke-width="2"/>
    <text x="707" y="165" fill="#000">Applications window</text>
    <text x="707" y="187" fill="#000" font-size="13">XDG .desktop entries</text>
    <rect x="505" y="210" width="405" height="72" fill="#c0c0c0" stroke="#000" stroke-width="2"/>
    <text x="707" y="237" fill="#000">Control Panel</text>
    <text x="707" y="260" fill="#000" font-size="13">nmcli · settings.conf · xss-lock</text>
  </g>
  <g stroke="#fff" stroke-width="3" fill="none">
    <path d="M195 144 H245"/>
    <path d="M455 88 H480 V41 H505"/>
    <path d="M455 120 H490 V104 H505"/>
    <path d="M455 166 H505"/>
    <path d="M455 210 H480 V246 H505"/>
  </g>
</svg>
